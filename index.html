<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NY IRAK'A">
  <title>NY IRAK'A</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#fff;--bg2:#f4f4f6;--bg3:#eeeef2;
      --text:#111118;--text2:#6b6b80;--text3:#9999b0;
      --border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.18);
      --accent:#5a7fc7;--adk:#1a1a2e;--alt:#e8eaf6;
      --danger:#c0392b;--r:12px;--rs:8px;
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#12121e;--bg2:#1c1c2e;--bg3:#24243a;
      --text:#e8eaf6;--text2:#9090b0;--text3:#5a5a78;
      --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
      --accent:#7a9fe0;--adk:#252550;--alt:#1e2040;
      --danger:#e05a5a;
    }}
    html,body{height:100%;overflow:hidden;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

    .header{background:var(--bg);border-bottom:.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top));}
    .logo{width:36px;height:36px;background:var(--adk);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .brand{font-size:17px;font-weight:600;letter-spacing:-.3px;}
    .brand span{color:var(--accent);}
    .brand-sub{font-size:11px;color:var(--text3);}
    .status-dot{width:8px;height:8px;border-radius:50%;background:#4caf50;flex-shrink:0;}
    .status-dot.offline{background:#ff9800;}
    .status-dot.syncing{background:var(--accent);animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

    .search-wrap{padding:10px 16px;background:var(--bg);border-bottom:.5px solid var(--border);flex-shrink:0;}
    .search-bar{display:flex;align-items:center;gap:8px;background:var(--bg2);border:.5px solid var(--border);border-radius:999px;padding:8px 14px;}
    .search-bar input{border:none;background:transparent;outline:none;font-size:14px;color:var(--text);width:100%;}
    .search-bar input::placeholder{color:var(--text3);}

    #view-list,#view-detail{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

    .songs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:16px;}
    .song-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:border-color .15s,transform .1s;-webkit-tap-highlight-color:transparent;}
    .song-card:active{transform:scale(.97);}
    .song-card.active{border-color:var(--accent);border-width:1.5px;}
    .song-thumb{width:100%;height:70px;border-radius:8px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:26px;}
    .song-title{font-size:13px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .song-meta{font-size:11px;color:var(--text2);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .tags{display:flex;gap:4px;flex-wrap:wrap;}
    .tag{font-size:10px;padding:2px 7px;border-radius:999px;background:var(--bg2);color:var(--text2);border:.5px solid var(--border);}
    .sec-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;padding:14px 16px 4px;}
    .empty-msg{text-align:center;padding:4rem 2rem;color:var(--text3);font-size:14px;line-height:1.8;}
    .no-result{text-align:center;padding:2rem;color:var(--text3);font-size:14px;}

    .detail-back{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:.5px solid var(--border);cursor:pointer;font-size:14px;color:var(--accent);-webkit-tap-highlight-color:transparent;}
    .detail-hero{padding:20px 16px 16px;display:flex;align-items:center;gap:16px;border-bottom:.5px solid var(--border);}
    .detail-thumb{width:72px;height:72px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;}
    .detail-title{font-size:18px;font-weight:700;margin-bottom:3px;}
    .detail-sub{font-size:13px;color:var(--text2);}
    .sec-block{margin:14px 16px;}
    .sec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}

    .track-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
    .track-item{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rs);padding:10px 12px;}
    .track-item.active-track{border-color:var(--accent);}
    .track-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .track-name{font-size:13px;font-weight:500;flex:1;}
    .track-del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;padding:0 4px;}
    .mini-ctrl{display:flex;align-items:center;gap:8px;}
    .mini-play{width:30px;height:30px;border-radius:50%;background:var(--adk);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .mini-prog{flex:1;height:3px;background:var(--border2);border-radius:3px;cursor:pointer;}
    .mini-fill{height:100%;background:var(--accent);border-radius:3px;}
    .mini-time{font-size:10px;color:var(--text3);min-width:32px;text-align:right;}
    .add-track{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--accent);cursor:pointer;padding:6px 0;}

    .lyrics-area{width:100%;min-height:180px;font-size:15px;line-height:1.9;color:var(--text);background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rs);padding:12px;resize:vertical;font-family:inherit;}
    .lyrics-area:focus{outline:none;border-color:var(--accent);}
    .action-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
    .btn{padding:9px 18px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--text);-webkit-tap-highlight-color:transparent;}
    .btn:active{opacity:.7;}
    .btn.primary{background:var(--adk);color:var(--alt);border-color:transparent;}
    .btn.danger{color:var(--danger);}
    .btn.kbtn{background:#080810;color:#fff;border-color:transparent;display:flex;align-items:center;gap:6px;}

    .fab{position:fixed;bottom:max(24px,env(safe-area-inset-bottom,24px));right:20px;width:56px;height:56px;border-radius:50%;background:var(--adk);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:50;}
    .fab:active{transform:scale(.94);}

    .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:200;}
    .modal-ov.open{display:flex;}
    .modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 20px max(20px,env(safe-area-inset-bottom));width:100%;max-height:90vh;overflow-y:auto;}
    .modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px;}
    .modal h3{font-size:17px;font-weight:700;margin-bottom:18px;}
    .fl{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;}
    .fi{width:100%;padding:11px 14px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rs);font-size:15px;color:var(--text);margin-bottom:14px;outline:none;font-family:inherit;}
    .fi:focus{border-color:var(--accent);}
    .upload-zone{border:1.5px dashed var(--border2);border-radius:var(--rs);padding:20px;text-align:center;cursor:pointer;font-size:13px;color:var(--text2);margin-bottom:18px;}
    .upload-zone.has-file{border-style:solid;border-color:var(--accent);color:var(--text);}
    .modal-acts{display:flex;gap:10px;}
    .modal-acts .btn{flex:1;text-align:center;}

    .track-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:300;}
    .track-ov.open{display:flex;}
    .track-modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 20px max(20px,env(safe-area-inset-bottom));width:100%;}

    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--adk);color:var(--alt);padding:8px 18px;border-radius:999px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:500;white-space:nowrap;}
    .toast.show{opacity:1;}

    /* ═══ KARAOKE ═══════════════════════════════════════ */
    #kview{display:none;position:fixed;inset:0;background:#080810;z-index:1000;flex-direction:column;}
    #kview.open{display:flex;}
    .k-top{display:flex;align-items:center;justify-content:space-between;padding:max(16px,env(safe-area-inset-top)) 20px 14px;border-bottom:.5px solid rgba(255,255,255,.07);flex-shrink:0;}
    .k-info .kt{font-size:18px;font-weight:700;color:#fff;}
    .k-info .ka{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px;}
    .k-acts{display:flex;gap:8px;}
    .k-ibtn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.7);cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .k-scrollbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:rgba(255,255,255,.03);border-bottom:.5px solid rgba(255,255,255,.05);flex-shrink:0;}
    .k-slabel{font-size:11px;color:rgba(255,255,255,.4);white-space:nowrap;}
    .k-stoggle{width:40px;height:22px;border-radius:11px;background:rgba(255,255,255,.12);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
    .k-stoggle.on{background:var(--accent);}
    .k-stoggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;}
    .k-stoggle.on::after{left:21px;}
    .k-spwrap{display:flex;align-items:center;gap:8px;flex:1;}
    .k-slider{flex:1;accent-color:var(--accent);}
    .k-sval{font-size:11px;color:rgba(255,255,255,.5);min-width:24px;text-align:right;}
    .k-lyrics{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:28px 28px 150px;}
    .k-lyrics p{font-size:clamp(20px,3.5vw,34px);line-height:2;color:rgba(255,255,255,.9);text-align:center;font-weight:500;white-space:pre-wrap;}
    .k-lyrics p.empty{color:rgba(255,255,255,.2);font-size:16px;font-style:italic;}
    .k-player{position:absolute;bottom:0;left:0;right:0;background:rgba(8,8,16,.97);border-top:.5px solid rgba(255,255,255,.07);padding:12px 20px max(16px,env(safe-area-inset-bottom));}
    .k-trow{display:flex;gap:7px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
    .k-tbtn{padding:4px 12px;border-radius:999px;border:.5px solid rgba(255,255,255,.18);background:transparent;color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .k-tbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
    .k-ctrl{display:flex;align-items:center;gap:10px;}
    .k-cbtn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .k-cbtn.play{background:#fff;}
    .k-cbtn.sec{background:rgba(255,255,255,.1);}
    .k-prog{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:4px;cursor:pointer;}
    .k-pfill{height:100%;background:var(--accent);border-radius:4px;}
    .k-time{font-size:11px;color:rgba(255,255,255,.35);min-width:36px;text-align:right;}

    .loading-screen{position:fixed;inset:0;background:var(--adk);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;gap:16px;}
    .loading-screen.done{display:none;}
    .loading-logo{font-size:48px;}
    .loading-text{font-size:16px;color:rgba(255,255,255,.6);}
    .loading-bar{width:120px;height:3px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
    .loading-fill{height:100%;background:var(--accent);border-radius:3px;animation:load 1.5s ease-in-out infinite;}
    @keyframes load{0%{width:0;margin-left:0;}50%{width:80%;margin-left:10%;}100%{width:0;margin-left:120px;}}
  </style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="loading-logo">🎵</div>
  <div class="loading-text">NY IRAK'A</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
      <path d="M9 18V5l12-2v13" stroke="#5a7fc7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="6" cy="18" r="3" stroke="#e8eaf6" stroke-width="1.5"/>
      <circle cx="18" cy="16" r="3" stroke="#e8eaf6" stroke-width="1.5"/>
    </svg>
  </div>
  <div style="flex:1;">
    <div class="brand">NY <span>IRAK'A</span></div>
    <div class="brand-sub">Bibliothèque chorale</div>
  </div>
  <div class="status-dot" id="status-dot" title="Connexion"></div>
</div>

<div class="search-wrap">
  <div class="search-bar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text3);flex-shrink:0;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-input" type="text" placeholder="Rechercher titre, artiste..." oninput="filterSongs()">
  </div>
</div>

<div id="view-list">
  <div class="sec-label" id="grid-label">Toutes les chansons</div>
  <div class="songs-grid" id="songs-grid"></div>
  <div class="no-result" id="no-result" style="display:none;">Aucune chanson trouvée</div>
  <div class="empty-msg" id="empty-msg" style="display:none;">Aucune chanson encore.<br>Appuyez sur <strong>+</strong> pour commencer.</div>
  <div style="height:80px;"></div>
</div>

<div id="view-detail" style="display:none;">
  <div class="detail-back" onclick="showList()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </div>
  <div class="detail-hero">
    <div class="detail-thumb" id="d-thumb"></div>
    <div>
      <div class="detail-title" id="d-title"></div>
      <div class="detail-sub" id="d-sub"></div>
      <div class="tags" id="d-tags" style="margin-top:8px;"></div>
    </div>
  </div>
  <div class="sec-block">
    <div class="sec-title">
      <span>Pistes audio</span>
      <span id="track-count" style="color:var(--text3);font-weight:400;"></span>
    </div>
    <div class="track-list" id="track-list"></div>
    <div class="add-track" onclick="openTrackModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Ajouter une piste audio
    </div>
  </div>
  <div class="sec-block">
    <div class="sec-title"><span>Paroles</span></div>
    <textarea class="lyrics-area" id="lyrics-area" placeholder="Collez ou saisissez les paroles ici..." oninput="scheduleAutoSave()"></textarea>
    <div class="action-row">
      <button class="btn primary" onclick="saveLyrics()">Enregistrer</button>
      <button class="btn kbtn" onclick="openKaraoke()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor"/></svg>
        Mode karaoké
      </button>
      <button class="btn danger" onclick="deleteSong()">Supprimer</button>
    </div>
  </div>
  <div style="height:40px;"></div>
</div>

<button class="fab" onclick="openModal()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e8eaf6" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<div class="modal-ov" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Nouvelle chanson</h3>
    <label class="fl">Titre</label>
    <input class="fi" type="text" id="new-title" placeholder="Titre de la chanson">
    <label class="fl">Artiste / Compositeur</label>
    <input class="fi" type="text" id="new-artist" placeholder="Artiste ou compositeur">
    <label class="fl">Catégorie</label>
    <input class="fi" type="text" id="new-cat" placeholder="Louange, Cantique, Noël...">
    <div class="modal-acts">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn primary" onclick="createSong()">Créer</button>
    </div>
  </div>
</div>

<div class="track-ov" id="track-modal">
  <div class="track-modal">
    <div class="modal-handle"></div>
    <h3>Ajouter une piste</h3>
    <label class="fl">Nom de la piste</label>
    <input class="fi" type="text" id="track-name-in" placeholder="Ex : Voix soprano, Playback...">
    <div class="upload-zone" id="track-zone" onclick="document.getElementById('track-file-in').click()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 8px;display:block;color:var(--text3);"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span id="track-drop-label">Appuyer pour choisir un fichier audio</span>
      <input type="file" id="track-file-in" accept="audio/*" style="display:none;" onchange="onTrackFile(event)">
    </div>
    <div class="modal-acts">
      <button class="btn" onclick="closeTrackModal()">Annuler</button>
      <button class="btn primary" id="add-track-btn" onclick="addTrack()">Ajouter</button>
    </div>
  </div>
</div>

<!-- KARAOKE -->
<div id="kview">
  <div class="k-top">
    <div class="k-info">
      <div class="kt" id="k-title"></div>
      <div class="ka" id="k-artist"></div>
    </div>
    <div class="k-acts">
      <button class="k-ibtn" onclick="kFullscreen()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
      <button class="k-ibtn" onclick="closeKaraoke()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div class="k-scrollbar">
    <span class="k-slabel">Défilement</span>
    <button class="k-stoggle" id="k-stoggle" onclick="toggleAutoScroll()"></button>
    <div class="k-spwrap">
      <span class="k-slabel">Vitesse</span>
      <input type="range" class="k-slider" id="k-speed" min="1" max="10" value="4" oninput="onSpeedChange()">
      <span class="k-sval" id="k-sval">4</span>
    </div>
    <span class="k-slabel" id="k-sync-lbl" style="color:#7a9fe0;display:none;">⟳ sync</span>
  </div>
  <div class="k-lyrics" id="k-lyrics">
    <div id="k-lyrics-inner"></div>
  </div>
  <div class="k-player">
    <div class="k-trow" id="k-trow"></div>
    <div class="k-ctrl">
      <button class="k-cbtn sec" onclick="kSeekRel(-10)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
      </button>
      <button class="k-cbtn play" onclick="kTogglePlay()">
        <svg id="k-picon" width="16" height="16" viewBox="0 0 24 24" fill="#080810"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="k-cbtn sec" onclick="kSeekRel(10)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.5"/></svg>
      </button>
      <div class="k-prog" id="k-prog" onclick="kSeekTo(event)">
        <div class="k-pfill" id="k-pfill" style="width:0%"></div>
      </div>
      <div class="k-time" id="k-time">0:00</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG SUPABASE ────────────────────────────────────
const SB_URL = 'https://bslibytbslsrxrlnhthb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbGlieXRic2xzcnhybG5odGhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODgwMjcsImV4cCI6MjA4OTg2NDAyN30.4Jid2obnFBCHV8Bxmm6rxIJg5fcsdN6SF5dHdxHfOJE';

const COLORS=['#e8eaf6','#e3f2fd','#fce4ec','#e8f5e9','#fff8e1','#f3e5f5','#fce8d0','#d8f5e8'];
const EMOJIS=['🎵','🎶','🎼','🎹','🎺','🎸','🪗','🥁'];

let songs=[], currentSong=null;
let trackAudios={}, activeTrackId=null;
let kAudio=null, kPlaying=false;
let modalTrackFile=null, autoSaveTimer=null;
let autoScrollOn=false, autoScrollTimer=null, scrollSpeed=4;
let manualScrolling=false, manualScrollTimer=null;

// ── API HELPERS ────────────────────────────────────────
async function sbFetch(path, opts={}){
  const res = await fetch(SB_URL+path, {
    ...opts,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer '+SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...opts.headers
    }
  });
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function sbGet(table, query=''){
  return await sbFetch('/rest/v1/'+table+'?'+query+'&order=created_at.desc');
}
async function sbInsert(table, data){
  return await sbFetch('/rest/v1/'+table, {method:'POST', body:JSON.stringify(data)});
}
async function sbUpdate(table, id, data){
  return await sbFetch('/rest/v1/'+table+'?id=eq.'+id, {method:'PATCH', body:JSON.stringify(data)});
}
async function sbDelete(table, id){
  return await sbFetch('/rest/v1/'+table+'?id=eq.'+id, {method:'DELETE'});
}
async function sbDeleteTrack(id){
  return await sbFetch('/rest/v1/tracks?id=eq.'+id, {method:'DELETE'});
}

async function uploadAudio(file, path){
  setStatus('syncing');
  const res = await fetch(SB_URL+'/storage/v1/object/audio/'+path, {
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type,'x-upsert':'true'},
    body: file
  });
  if(!res.ok) throw new Error('Upload failed');
  return SB_URL+'/storage/v1/object/public/audio/'+path;
}

async function deleteAudioFile(path){
  await fetch(SB_URL+'/storage/v1/object/audio/'+path, {
    method:'DELETE',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
}

// ── STATUS ─────────────────────────────────────────────
function setStatus(s){
  const d=document.getElementById('status-dot');
  d.className='status-dot'+(s==='offline'?' offline':s==='syncing'?' syncing':'');
}

// ── TOAST ──────────────────────────────────────────────
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ── INIT ───────────────────────────────────────────────
async function init(){
  try{
    songs = await sbGet('songs','select=*,tracks(*)') || [];
    setStatus('online');
  } catch(e){
    setStatus('offline');
    toast('⚠️ Connexion impossible');
    songs=[];
  }
  renderGrid(songs);
  document.getElementById('loading').classList.add('done');
}

// ── GRID ───────────────────────────────────────────────
function renderGrid(list){
  const grid=document.getElementById('songs-grid');
  const noRes=document.getElementById('no-result');
  const emptyMsg=document.getElementById('empty-msg');
  if(!songs.length){grid.innerHTML='';noRes.style.display='none';emptyMsg.style.display='block';return;}
  emptyMsg.style.display='none';
  if(!list.length){grid.innerHTML='';noRes.style.display='block';return;}
  noRes.style.display='none';
  grid.innerHTML=list.map(s=>`
    <div class="song-card ${currentSong&&currentSong.id===s.id?'active':''}" onclick="openSong(${s.id})">
      <div class="song-thumb" style="background:${s.color};">${s.emoji}</div>
      <div class="song-title">${s.title}</div>
      <div class="song-meta">${s.artist}</div>
      <div class="tags">
        <span class="tag">${s.cat}</span>
        ${s.tracks&&s.tracks.length?`<span class="tag">🎵 ${s.tracks.length}</span>`:''}
        ${s.lyrics?'<span class="tag">📝</span>':''}
      </div>
    </div>`).join('');
}

function filterSongs(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const filtered=q?songs.filter(s=>s.title.toLowerCase().includes(q)||s.artist.toLowerCase().includes(q)||s.cat.toLowerCase().includes(q)):songs;
  document.getElementById('grid-label').textContent=q?`Résultats pour "${q}"`:'Toutes les chansons';
  renderGrid(filtered);
}

// ── NAV ────────────────────────────────────────────────
function showList(){stopAllTracks();document.getElementById('view-list').style.display='block';document.getElementById('view-detail').style.display='none';document.querySelector('.fab').style.display='flex';}
function showDetail(){document.getElementById('view-list').style.display='none';document.getElementById('view-detail').style.display='block';document.querySelector('.fab').style.display='none';document.getElementById('view-detail').scrollTop=0;}

// ── OPEN SONG ──────────────────────────────────────────
async function openSong(id){
  stopAllTracks();
  currentSong=songs.find(s=>s.id===id);
  if(!currentSong)return;
  if(!currentSong.tracks)currentSong.tracks=[];
  document.getElementById('d-thumb').textContent=currentSong.emoji;
  document.getElementById('d-thumb').style.background=currentSong.color;
  document.getElementById('d-title').textContent=currentSong.title;
  document.getElementById('d-sub').textContent=currentSong.artist;
  document.getElementById('d-tags').innerHTML=`<span class="tag">${currentSong.cat}</span>`;
  document.getElementById('lyrics-area').value=currentSong.lyrics||'';
  renderTrackList();
  showDetail();
  renderGrid(songs);
}

// ── TRACKS ─────────────────────────────────────────────
function renderTrackList(){
  const tracks=currentSong.tracks||[];
  document.getElementById('track-count').textContent=tracks.length?`${tracks.length} piste${tracks.length>1?'s':''}`:'' ;
  const list=document.getElementById('track-list');
  if(!tracks.length){list.innerHTML='<div style="font-size:13px;color:var(--text3);padding:4px 0;">Aucune piste audio.</div>';return;}
  list.innerHTML=tracks.map(tr=>`
    <div class="track-item ${activeTrackId===tr.id?'active-track':''}" id="ti-${tr.id}">
      <div class="track-header">
        <div class="track-name">🎵 ${tr.name}</div>
        <button class="track-del" onclick="deleteTrack('${tr.id}','${tr.audio_url||''}')">✕</button>
      </div>
      <div class="mini-ctrl">
        <button class="mini-play" id="mp-${tr.id}" onclick="toggleTrack('${tr.id}','${tr.audio_url||''}')">
          <svg id="mpi-${tr.id}" width="11" height="11" viewBox="0 0 24 24" fill="#e8eaf6"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <div class="mini-prog" onclick="trackSeekTo(event,'${tr.id}')">
          <div class="mini-fill" id="mpf-${tr.id}" style="width:0%"></div>
        </div>
        <div class="mini-time" id="mt-${tr.id}">0:00</div>
      </div>
    </div>`).join('');
}

function stopAllTracks(){Object.values(trackAudios).forEach(a=>{if(a)a.pause();});trackAudios={};activeTrackId=null;}

async function toggleTrack(tid, url){
  if(!url){toast('⚠️ Aucun audio');return;}
  Object.entries(trackAudios).forEach(([id,a])=>{if(id!==tid&&a){a.pause();updateMiniIcon(id,false);}});
  if(!trackAudios[tid]){
    const audio=new Audio(url);
    audio.ontimeupdate=()=>{
      const pct=audio.duration?(audio.currentTime/audio.duration)*100:0;
      const el=document.getElementById('mpf-'+tid);const tel=document.getElementById('mt-'+tid);
      if(el)el.style.width=pct+'%';
      if(tel){const t=Math.floor(audio.currentTime);tel.textContent=Math.floor(t/60)+':'+(t%60+'').padStart(2,'0');}
    };
    audio.onended=()=>{updateMiniIcon(tid,false);activeTrackId=null;};
    trackAudios[tid]=audio;
  }
  const a=trackAudios[tid];
  if(activeTrackId===tid&&!a.paused){a.pause();activeTrackId=null;updateMiniIcon(tid,false);}
  else{a.play();activeTrackId=tid;updateMiniIcon(tid,true);document.querySelectorAll('.track-item').forEach(el=>el.classList.remove('active-track'));const ti=document.getElementById('ti-'+tid);if(ti)ti.classList.add('active-track');}
}

function trackSeekTo(e,tid){const a=trackAudios[tid];if(!a||!a.duration)return;const r=e.currentTarget.getBoundingClientRect();a.currentTime=((e.clientX-r.left)/r.width)*a.duration;}
function updateMiniIcon(tid,p){const i=document.getElementById('mpi-'+tid);if(!i)return;i.innerHTML=p?'<rect x="6" y="4" width="4" height="16" fill="#e8eaf6"/><rect x="14" y="4" width="4" height="16" fill="#e8eaf6"/>':'<polygon points="5 3 19 12 5 21 5 3" fill="#e8eaf6"/>';}

function openTrackModal(){document.getElementById('track-modal').classList.add('open');}
function closeTrackModal(){document.getElementById('track-modal').classList.remove('open');document.getElementById('track-name-in').value='';document.getElementById('track-drop-label').textContent='Appuyer pour choisir un fichier audio';document.getElementById('track-zone').classList.remove('has-file');modalTrackFile=null;}
function onTrackFile(e){if(!e.target.files[0])return;modalTrackFile=e.target.files[0];document.getElementById('track-drop-label').textContent='🎵 '+modalTrackFile.name;document.getElementById('track-zone').classList.add('has-file');if(!document.getElementById('track-name-in').value)document.getElementById('track-name-in').value=modalTrackFile.name.replace(/\.[^.]+$/,'');}

async function addTrack(){
  if(!currentSong||!modalTrackFile){toast('⚠️ Choisissez un fichier');return;}
  const name=document.getElementById('track-name-in').value.trim()||modalTrackFile.name;
  const btn=document.getElementById('add-track-btn');
  btn.textContent='Envoi...';btn.disabled=true;
  try{
    const safeName = modalTrackFile.name
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-zA-Z0-9._-]/g,'_')
      .replace(/__+/g,'_');
    const path=`${currentSong.id}/${Date.now()}_${safeName}`;
    const url=await uploadAudio(modalTrackFile,path);
    const trackId='tr_'+Date.now();
    const [newTrack]=await sbInsert('tracks',{id:trackId,song_id:currentSong.id,name,audio_url:url});
    if(!currentSong.tracks)currentSong.tracks=[];
    currentSong.tracks.push(newTrack||{id:trackId,name,audio_url:url});
    const idx=songs.findIndex(s=>s.id===currentSong.id);if(idx!==-1)songs[idx]=currentSong;
    closeTrackModal();renderTrackList();renderGrid(songs);
    setStatus('online');toast('🎵 Piste ajoutée');
  } catch(e){toast('❌ Erreur upload');setStatus('offline');}
  btn.textContent='Ajouter';btn.disabled=false;
}

async function deleteTrack(tid, url){
  if(!confirm('Supprimer cette piste ?'))return;
  if(trackAudios[tid]){trackAudios[tid].pause();delete trackAudios[tid];}
  try{
    await sbDeleteTrack(tid);
    if(url){const path=url.split('/object/public/audio/')[1];if(path)await deleteAudioFile(path);}
    currentSong.tracks=currentSong.tracks.filter(t=>t.id!==tid);
    const idx=songs.findIndex(s=>s.id===currentSong.id);if(idx!==-1)songs[idx]=currentSong;
    if(activeTrackId===tid)activeTrackId=null;
    renderTrackList();renderGrid(songs);toast('Piste supprimée');
  } catch(e){toast('❌ Erreur');}
}

// ── LYRICS ─────────────────────────────────────────────
function scheduleAutoSave(){clearTimeout(autoSaveTimer);autoSaveTimer=setTimeout(saveLyrics,1800);}
async function saveLyrics(){
  if(!currentSong)return;
  const lyrics=document.getElementById('lyrics-area').value;
  currentSong.lyrics=lyrics;
  const idx=songs.findIndex(s=>s.id===currentSong.id);if(idx!==-1)songs[idx]=currentSong;
  try{
    await sbUpdate('songs',currentSong.id,{lyrics});
    setStatus('online');renderGrid(songs);toast('✓ Sauvegardé');
  } catch(e){setStatus('offline');toast('❌ Erreur sauvegarde');}
}

async function deleteSong(){
  if(!currentSong||!confirm(`Supprimer "${currentSong.title}" ?`))return;
  stopAllTracks();
  try{
    for(const t of currentSong.tracks||[]){
      if(t.audio_url){const path=t.audio_url.split('/object/public/audio/')[1];if(path)await deleteAudioFile(path);}
      await sbDeleteTrack(t.id);
    }
    await sbDelete('songs',currentSong.id);
    songs=songs.filter(s=>s.id!==currentSong.id);
    currentSong=null;showList();renderGrid(songs);toast('Chanson supprimée');
  } catch(e){toast('❌ Erreur');}
}

// ── SONG MODAL ─────────────────────────────────────────
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');['new-title','new-artist','new-cat'].forEach(id=>document.getElementById(id).value='');}
async function createSong(){
  const title=document.getElementById('new-title').value.trim()||'Nouvelle chanson';
  const artist=document.getElementById('new-artist').value.trim()||'Inconnu';
  const cat=document.getElementById('new-cat').value.trim()||'Divers';
  const colorIdx=songs.length%COLORS.length;
  const emojiIdx=songs.length%EMOJIS.length;
  try{
    setStatus('syncing');
    const [song]=await sbInsert('songs',{title,artist,cat,color:COLORS[colorIdx],emoji:EMOJIS[emojiIdx],lyrics:''});
    song.tracks=[];
    songs.unshift(song);
    closeModal();renderGrid(songs);
    setStatus('online');openSong(song.id);
  } catch(e){setStatus('offline');toast('❌ Erreur création');}
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('track-modal').addEventListener('click',e=>{if(e.target===document.getElementById('track-modal'))closeTrackModal();});

// ══════════════════════════════════════════════════════
// KARAOKE
// ══════════════════════════════════════════════════════
async function openKaraoke(){
  if(!currentSong)return;
  document.getElementById('k-title').textContent=currentSong.title;
  document.getElementById('k-artist').textContent=currentSong.artist;
  const lyrics=currentSong.lyrics||'';
  const inner=document.getElementById('k-lyrics-inner');
  inner.innerHTML=lyrics.trim()?'<p>'+lyrics.replace(/\n\n+/g,'</p><p style="margin-top:2.5rem;">').replace(/\n/g,'<br>')+'</p>':'<p class="empty">Aucune parole saisie.</p>';
  document.getElementById('k-lyrics').scrollTop=0;
  const tracks=currentSong.tracks||[];
  const row=document.getElementById('k-trow');
  if(tracks.length){
    row.innerHTML=tracks.map((t,i)=>`<button class="k-tbtn ${i===0?'on':''}" id="ktb-${t.id}" onclick="kSelectTrack('${t.id}','${t.audio_url||''}')">${t.name}</button>`).join('');
    await kSelectTrack(tracks[0].id,tracks[0].audio_url||'');
  } else {
    row.innerHTML='<span style="font-size:11px;color:rgba(255,255,255,0.3);">Aucune piste audio</span>';
    kAudio=null;
  }
  autoScrollOn=false;
  document.getElementById('k-stoggle').classList.remove('on');
  document.getElementById('k-sync-lbl').style.display='none';
  stopAutoScroll();
  const wrap=document.getElementById('k-lyrics');
  wrap.onscroll=()=>{manualScrolling=true;clearTimeout(manualScrollTimer);manualScrollTimer=setTimeout(()=>{manualScrolling=false;},2000);};
  kPlaying=false;updateKIcon();
  document.getElementById('k-pfill').style.width='0%';
  document.getElementById('k-time').textContent='0:00';
  document.getElementById('kview').classList.add('open');
}

async function kSelectTrack(tid,url){
  if(kAudio){kAudio.pause();kAudio=null;kPlaying=false;updateKIcon();}
  document.querySelectorAll('.k-tbtn').forEach(b=>b.classList.remove('on'));
  const btn=document.getElementById('ktb-'+tid);if(btn)btn.classList.add('on');
  if(!url)return;
  kAudio=new Audio(url);
  kAudio.ontimeupdate=onKTick;
  kAudio.onended=()=>{kPlaying=false;updateKIcon();stopAutoScroll();};
}

function onKTick(){
  if(!kAudio||!kAudio.duration)return;
  const pct=kAudio.currentTime/kAudio.duration;
  document.getElementById('k-pfill').style.width=(pct*100)+'%';
  const t=Math.floor(kAudio.currentTime);
  document.getElementById('k-time').textContent=Math.floor(t/60)+':'+(t%60+'').padStart(2,'0');
  if(autoScrollOn&&!manualScrolling){
    const wrap=document.getElementById('k-lyrics');
    const max=wrap.scrollHeight-wrap.clientHeight;
    if(max>0) wrap.scrollTop+=(pct*max-wrap.scrollTop)*0.015;
  }
}

function kTogglePlay(){
  if(!kAudio)return;
  if(kPlaying){kAudio.pause();kPlaying=false;if(autoScrollOn&&(!kAudio||kAudio.paused))stopAutoScroll();}
  else{kAudio.play();kPlaying=true;if(autoScrollOn)startFixedScroll();}
  updateKIcon();
}

function updateKIcon(){
  const i=document.getElementById('k-picon');
  i.innerHTML=kPlaying?'<rect x="6" y="4" width="4" height="16" fill="#080810"/><rect x="14" y="4" width="4" height="16" fill="#080810"/>':'<polygon points="5 3 19 12 5 21 5 3" fill="#080810"/>';
}

function kSeekRel(s){if(!kAudio)return;kAudio.currentTime=Math.max(0,Math.min(kAudio.duration||0,kAudio.currentTime+s));}
function kSeekTo(e){if(!kAudio||!kAudio.duration)return;const r=document.getElementById('k-prog').getBoundingClientRect();kAudio.currentTime=((e.clientX-r.left)/r.width)*kAudio.duration;}

function closeKaraoke(){
  if(kAudio){kAudio.pause();kPlaying=false;updateKIcon();}
  stopAutoScroll();
  if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});
  document.getElementById('kview').classList.remove('open');
}

function kFullscreen(){
  const el=document.getElementById('kview');
  if(!document.fullscreenElement)(el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen).call(el).catch(()=>{});
  else(document.exitFullscreen||document.webkitExitFullscreen).call(document).catch(()=>{});
}

function toggleAutoScroll(){
  autoScrollOn=!autoScrollOn;
  const tog=document.getElementById('k-stoggle');
  const lbl=document.getElementById('k-sync-lbl');
  if(autoScrollOn){tog.classList.add('on');if(kAudio&&!kAudio.paused){lbl.style.display='inline';}else{lbl.style.display='none';startFixedScroll();}}
  else{tog.classList.remove('on');lbl.style.display='none';stopAutoScroll();}
}

function onSpeedChange(){
  scrollSpeed=parseInt(document.getElementById('k-speed').value);
  document.getElementById('k-sval').textContent=scrollSpeed;
  if(autoScrollOn&&(!kAudio||kAudio.paused)){stopAutoScroll();startFixedScroll();}
}

function startFixedScroll(){
  stopAutoScroll();
  const wrap=document.getElementById('k-lyrics');
  const px=scrollSpeed*0.6;
  autoScrollTimer=setInterval(()=>{
    if(manualScrolling)return;
    wrap.scrollTop+=px;
    if(wrap.scrollTop>=wrap.scrollHeight-wrap.clientHeight){stopAutoScroll();autoScrollOn=false;document.getElementById('k-stoggle').classList.remove('on');}
  },36);
}

function stopAutoScroll(){clearInterval(autoScrollTimer);autoScrollTimer=null;}

// ── SW ─────────────────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

init();
</script>
</body>
</html>
